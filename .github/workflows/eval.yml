name: agent-eval

# Section 4: eval as an engineering discipline.
#
# This is the whole point of moving eval out of a notebook: the SAME evalset the
# agent author ran by hand now runs on every push and pull request, and a drop
# below threshold turns the check RED and blocks the merge. The agent can't
# regress into main without someone seeing it first.
#
# Live demo: open a PR that weakens refund_agent/agent.py (e.g. let it refund
# before checking the policy). tool_trajectory_avg_score drops below 1.0, this
# job fails, and the PR shows a red X. Revert -> green.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the agent eval (this is the gate)
        env:
          # Store your model key as a repo secret named GOOGLE_API_KEY.
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pytest eval/ -v
